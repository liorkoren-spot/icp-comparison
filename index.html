<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICP Segment Comparison — SpotOn</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f9fafb; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const A = ({ href, children }) => (
      <a href={href} target="_blank" rel="noopener noreferrer"
        style={{ color: "inherit", textDecoration: "underline", opacity: 0.7 }}>
        {children}
      </a>
    );

    const data = {
      rows: [
        {
          label: "Market Size (US)",
          icon: "📊",
          fsr: {
            headline: "$260B revenue, 152K locations",
            points: [
              <><A href="https://www.ibisworld.com/united-states/number-of-businesses/single-location-full-service-restaurants/1678/">152,430 single-location FSRs (IBISWorld, 2025)</A></>,
              <><A href="https://www.ibisworld.com/united-states/market-size/single-location-full-service-restaurants/1678/">$260.1B total industry revenue in 2025 (IBISWorld)</A></>,
              <><A href="https://www.ibisworld.com/united-states/market-size/single-location-full-service-restaurants/1678/">Growing at ~1.7% YoY (IBISWorld)</A></>,
            ],
          },
          qsr: {
            headline: "$447B US market, ~250K+ locations",
            points: [
              <><A href="https://www.mordorintelligence.com/industry-reports/united-states-quick-service-restaurants-market">$447.2B US market in 2025 (Mordor Intelligence)</A></>,
              <><A href="https://www.statista.com/statistics/217561/number-of-quick-service-restaurant-franchise-establishments-in-the-us/">~195K+ franchise locations (Statista, 2023); total ~250K+ est.</A></>,
              <><A href="https://www.mordorintelligence.com/industry-reports/united-states-quick-service-restaurants-market">~3.8% CAGR — mature, slower growth (Mordor Intelligence)</A></>,
              <><A href="https://www.mordorintelligence.com/industry-reports/united-states-quick-service-restaurants-market">~60% of all US restaurant sales (Mordor Intelligence)</A></>,
            ],
          },
        },
        {
          label: "Scale & Growth Stage",
          icon: "🏗️",
          fsr: {
            headline: "Independent → regional group",
            points: [
              <>
                <strong>Independent (1–2 locations)</strong> — Owner in the building daily; buys tech themselves, no IT person
                <br/><span style={{fontSize:11.5,color:"#6b7280"}}>e.g. </span>
                <A href="https://chinalivesf.com/">China Live (SF)</A>{" · "}
                <A href="https://www.burlesbar.com/">Burle's Bar (Atlanta)</A>{" · "}
                <A href="https://sidecarbarsd.com/">Sidecar Bar (San Diego)</A>{" · "}
                <A href="https://www.waddellslonghorn.com/">Waddell's Longhorn (Buckeye AZ)</A>
              </>,
              <>
                <strong>Emerging multi-unit (3–15 locations)</strong> — Hiring first GMs, starting to systematize; owner still approves tech buys
                <br/><span style={{fontSize:11.5,color:"#6b7280"}}>e.g. </span>
                <A href="https://www.boka.com/">Boka Restaurant Group (Chicago)</A>{" · "}
                <A href="https://rpmrestaurants.com/">RPM Restaurants (Chicago)</A>
              </>,
              <>
                <strong>Regional / professional ops (15–75 locations)</strong> — Hired COO or VP Ops; formal procurement; tech evaluated centrally
                <br/><span style={{fontSize:11.5,color:"#6b7280"}}>e.g. </span>
                <A href="https://www.leye.com/">Lettuce Entertain You (Chicago, 50+ concepts)</A>
              </>,
              <>
                <strong>National chain / enterprise (75+ locations)</strong> — Corp-level tech mandates; typically outside SpotOn ICP
                <br/><span style={{fontSize:11.5,color:"#6b7280"}}>e.g. </span>
                <A href="https://www.darden.com/">Darden (Olive Garden, LongHorn)</A>{" · "}
                <A href="https://www.bloominbrands.com/">Bloomin' Brands (Outback)</A>
              </>,
            ],
          },
          qsr: {
            headline: "Independent → national franchisor",
            points: [
              <>
                <strong>Independent (1–3 locations)</strong> — Local owner-operator, not a franchise; buys own tech, tight margins
                <br/><span style={{fontSize:11.5,color:"#6b7280"}}>e.g. </span>
                <A href="https://brunswickburgerhouse.com/">Brunswick Burger House (Chicago)</A>{" · "}
                <A href="https://www.google.com/maps/search/?api=1&query=La+Taqueria+San+Francisco">La Taqueria (SF)</A>
              </>,
              <>
                <strong>Small franchisee (1–10 franchise units)</strong> — Running a national brand's locations; tech is largely dictated by the franchisor, not the operator
                <br/><span style={{fontSize:11.5,color:"#6b7280"}}>e.g. </span>
                <A href="https://www.google.com/maps/search/?api=1&query=Harold%27s+Chicken+Shack+Chicago">Harold's Chicken Shack (Chicago franchise system)</A>{" · "}
                <A href="https://www.google.com/maps/search/?api=1&query=Subway+Chicago">Local Subway franchisee</A>
              </>,
              <>
                <strong>Mid-size franchisee (10–50 units)</strong> — Starting to act like an operator; may push back on franchisor tech; SpotOn's most viable QSR ICP
                <br/><span style={{fontSize:11.5,color:"#6b7280"}}>e.g. </span>
                <A href="https://www.google.com/maps/search/?api=1&query=Portillo%27s+Chicago">Portillo's (Chicago-area franchisee group)</A>{" · "}
                <A href="https://www.in-n-out.com/">In-N-Out (CA regional, family-owned)</A>
              </>,
              <>
                <strong>Franchisor / national enterprise (50+ locations)</strong> — Tech baked into franchise agreement or mandated at corp level; near-impossible to displace
                <br/><span style={{fontSize:11.5,color:"#6b7280"}}>e.g. </span>
                <A href="https://corporate.mcdonalds.com/">McDonald's (HQ: Chicagoland)</A>{" · "}
                <A href="https://www.chick-fil-a.com/">Chick-fil-A</A>{" · "}
                <A href="https://www.tacobell.com/">Taco Bell</A>
              </>,
            ],
          },
        },
        {
          label: "Operator Breakdown",
          icon: "🏢",
          fsr: {
            headline: "Predominantly independent owners",
            points: [
              <><A href="https://www.ibisworld.com/united-states/number-of-businesses/single-location-full-service-restaurants/1678/">152K locations are by definition single-unit independents (IBISWorld)</A></>,
              "Owner makes all technology decisions directly",
              "Win one restaurant, grow by referral — fragmented but high-intent buyers",
              "Multi-unit FSR operators (Darden, etc.) exist but are not the ICP",
            ],
          },
          qsr: {
            headline: "Franchise-dominated, independent minority",
            points: [
              <><A href="https://www.statista.com/statistics/217561/number-of-quick-service-restaurant-franchise-establishments-in-the-us/">~195K of ~250K locations are franchise-operated (Statista/Rezku)</A></>,
              <><A href="https://rezku.com/blog/qsr-industry/">~50K est. independent QSRs — weak economics at single-unit (Rezku)</A></>,
              <><A href="https://www.jackintheboxfranchising.com/qsr-industry">Franchisees with 1–10 units are common, but tech decisions are driven by the franchisor (Jack in the Box Franchising)</A></>,
              "Viable ICP: franchisee with 50+ units, or regional chain — below that, spend rarely justifies enterprise tech",
            ],
          },
        },
        {
          label: "Average Check Size",
          icon: "💰",
          fsr: {
            headline: "$18–$35+ per person",
            points: [
              <><A href="https://nationalrestaurantauthority.com/restaurant-industry-segments">$18–$35 casual dining; $35–$80+ fine dining (National Restaurant Authority)</A></>,
              <><A href="https://nationalrestaurantauthority.com/restaurant-industry-segments">Tip income adds ~18–22% to transaction value (National Restaurant Authority)</A></>,
              "Occasion-driven: anniversaries, business dinners, celebrations",
            ],
          },
          qsr: {
            headline: "$8–$12 per person",
            points: [
              <><A href="https://dojobusiness.com/blogs/news/restaurant-average-check">$8–$12 average check — volume is the margin driver (BusinessDojo)</A></>,
              <><A href="https://rezku.com/blog/qsr-industry/">Drive-thru adds 40–70% to revenue potential per location (Rezku)</A></>,
              "High transaction volume (100–500+ tickets/day per location)",
              <><A href="https://rezku.com/blog/qsr-industry/">Digital kiosks shown to increase check 15–20% (Rezku)</A></>,
            ],
          },
        },
        {
          label: "Profit Margins",
          icon: "📈",
          fsr: {
            headline: "3–5% net margin",
            points: [
              <><A href="https://whipplewood.com/insights/financial-benchmarks-for-restaurants/">3–5% net margin; well-run casual dining at 5–7% (Whipplewood 2026)</A></>,
              <><A href="https://whipplewood.com/insights/financial-benchmarks-for-restaurants/">Thinnest margins of the three segments (Whipplewood 2026)</A></>,
              <><A href="https://www.touchbistro.com/blog/state-of-restaurants-report/">Labor cost median: 36.5% of sales; profitable ops: 34.2% (TouchBistro 2026)</A></>,
              <><A href="https://vantainsights.com/insights/restaurant-food-cost-percentage">Food cost: 28–35% of sales (VantaInsights)</A></>,
              "High sensitivity to labor laws, tariffs, and inflation",
            ],
          },
          qsr: {
            headline: "6–12% net margin",
            points: [
              <><A href="https://www.restroworks.com/blog/restaurant-profitability-statistics/">6–12% net margin — highest of the two (Restroworks)</A></>,
              <><A href="https://www.restroworks.com/blog/restaurant-profitability-statistics/">20–25% food costs; volume offsets low check size (Restroworks)</A></>,
              <><A href="https://rezku.com/blog/qsr-industry/">15–25 employees, lower skill requirement (Rezku)</A></>,
              <><A href="https://rezku.com/blog/qsr-industry/">Drive-thru is the #1 margin driver at scale (Rezku)</A></>,
            ],
          },
        },
        {
          label: "Features & Technology",
          icon: "⚙️",
          type: "comparison",
          mostlyFsr: [
            "Tableside + handheld ordering",
            "Coursing & course firing",
            "Seat management",
            "Split checks",
            "Server workflows",
            "Reservations (OpenTable, Resy)",
            "Waitlist",
            "Guest profiles + CRM",
            "QR order & pay",
            "Inventory management",
          ],
          both: [
            "Fast payments",
            "Complex modifiers",
            "Discounts & taxes",
            "Digital ordering",
            "Labor management & scheduling",
            "KDS",
            "Reporting",
          ],
          mostlyQsr: [
            "Counter ordering",
            "Drive-thru POS",
            "Self-service kiosks",
            "Multi-location management",
            "Loyalty programs",
            "Payment flow speed",
            "Catering / delivery",
            "Franchise management & reporting",
          ],
          note: "QSR and FSR share ~60–70% of the foundation, but the remaining 30–40% drives a disproportionate amount of complexity, product decisions, and roadmap tradeoffs.",
        },
        {
          label: "Ownership & Go-to-Market",
          icon: "🏪",
          fsr: {
            headline: "Fragmented independents — win one at a time",
            points: [
              <><A href="https://www.ibisworld.com/united-states/number-of-businesses/single-location-full-service-restaurants/1678/">Highly fragmented — thousands of independent operators (IBISWorld)</A></>,
              "Primary competition is other independent POS vendors (Toast, Square), not enterprise systems",
              "Owners make their own technology decisions with no corporate mandate",
              "Win one restaurant, build a reputation — referrals drive growth",
              "ICP: independent operator, 1–5 locations, high complexity",
            ],
          },
          qsr: {
            headline: "Franchise-first; independent operators are a small slice",
            points: [
              <><A href="https://www.mordorintelligence.com/industry-reports/united-states-quick-service-restaurants-market">Dominated by franchises (McDonald's, Chick-fil-A, Domino's) (Mordor Intelligence)</A></>,
              "Single location economics rarely justify enterprise tech spend",
              <><A href="https://www.myr.io/blog/future-of-qsr-2026-trends-priorities-for-franchise-leaders">Tech decisions are typically franchisor-mandated, though some progressive brands allow franchisee input on POS selection (MYR POS)</A></>,
              "Must serve multi-location from day one to be viable",
              "ICP: franchisee with 5–50 locations, or regional chain",
            ],
          },
        },
      ],
    };

    const COLS = ["fsr", "qsr"];
    const COL_LABELS = { fsr: "FSR", qsr: "QSR" };
    const COL_COLORS = {
      fsr: { bg: "#1a1a2e", accent: "#6c63ff", light: "#f0eeff" },
      qsr: { bg: "#b45309", accent: "#f59e0b", light: "#fffbeb" },
    };

    function IcpComparison() {
      const [expanded, setExpanded] = useState({});
      const toggle = (rowIdx, col) => {
        const key = `${rowIdx}-${col}`;
        setExpanded(prev => ({ ...prev, [key]: !prev[key] }));
      };

      return (
        <div style={{ fontFamily: "'Inter', system-ui, sans-serif", background: "#f9fafb", minHeight: "100vh", padding: "2rem 1rem" }}>
          <div style={{ maxWidth: 900, margin: "0 auto" }}>

            <div style={{ marginBottom: "2rem", textAlign: "center" }}>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.15em", color: "#9ca3af", textTransform: "uppercase", marginBottom: 8 }}>
                SpotOn · ICP Strategy
              </div>
              <h1 style={{ fontSize: "clamp(1.8rem, 4vw, 2.6rem)", fontWeight: 800, color: "#111827", margin: 0, lineHeight: 1.1 }}>
                ICP Segment Comparison
              </h1>
              <p style={{ color: "#6b7280", marginTop: 8, fontSize: 15 }}>
                FSR · QSR — market data, economics, and tech implications
              </p>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "200px 1fr 1fr", gap: 8, marginBottom: 8 }}>
              <div />
              {COLS.map(col => (
                <div key={col} style={{
                  background: COL_COLORS[col].bg, color: "#fff", borderRadius: 10,
                  padding: "12px 16px", textAlign: "center", fontWeight: 700, fontSize: 17, letterSpacing: "0.02em",
                }}>
                  {COL_LABELS[col]}
                </div>
              ))}
            </div>

            {data.rows.map((row, rowIdx) => (
              <div key={rowIdx} style={{ display: "grid", gridTemplateColumns: "200px 1fr 1fr", gap: 8, marginBottom: 8 }}>
                <div style={{
                  display: "flex", flexDirection: "column", justifyContent: "flex-start",
                  padding: "14px 12px", background: "#fff", border: "1px solid #e5e7eb", borderRadius: 10,
                }}>
                  <div style={{ fontSize: 18, marginBottom: 4 }}>{row.icon}</div>
                  <div style={{ fontWeight: 700, fontSize: 13, color: "#111827", lineHeight: 1.3 }}>{row.label}</div>
                </div>

                {row.type === "comparison" ? (
                  <div style={{ gridColumn: "2 / 4", background: "#fff", border: "1px solid #e5e7eb", borderRadius: 10, overflow: "hidden" }}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr" }}>
                      {[
                        { key: "mostlyFsr", label: "Mostly FSR", colors: COL_COLORS.fsr },
                        { key: "both",      label: "Both",       colors: { bg: "#374151", accent: "#6b7280", light: "#f3f4f6" } },
                        { key: "mostlyQsr", label: "Mostly QSR", colors: COL_COLORS.qsr },
                      ].map((col, ci) => (
                        <div key={col.key} style={{
                          borderRight: ci < 2 ? "1px solid #e5e7eb" : "none",
                          padding: "12px 14px",
                        }}>
                          <div style={{
                            display: "inline-block", fontSize: 11, fontWeight: 700,
                            color: col.colors.bg, background: col.colors.light,
                            borderRadius: 4, padding: "2px 7px", marginBottom: 8, letterSpacing: "0.03em",
                          }}>
                            {col.label}
                          </div>
                          <ul style={{ margin: 0, padding: "0 0 0 16px", listStyle: "disc" }}>
                            {row[col.key].map((item, i) => (
                              <li key={i} style={{ fontSize: 12.5, color: "#374151", marginBottom: 4, lineHeight: 1.5 }}>
                                {item}
                              </li>
                            ))}
                          </ul>
                        </div>
                      ))}
                    </div>
                    {row.note && (
                      <div style={{ borderTop: "1px solid #e5e7eb", padding: "10px 14px", background: "#f9fafb" }}>
                        <p style={{ margin: 0, fontSize: 12.5, color: "#6b7280", fontStyle: "italic", lineHeight: 1.6 }}>
                          {row.note}
                        </p>
                      </div>
                    )}
                  </div>
                ) : (
                  COLS.map(col => {
                    const cell = row[col];
                    const key = `${rowIdx}-${col}`;
                    const isOpen = !!expanded[key];
                    const colors = COL_COLORS[col];
                    return (
                      <div key={col} style={{ background: "#fff", border: "1px solid #e5e7eb", borderRadius: 10, overflow: "hidden" }}>
                        <button onClick={() => toggle(rowIdx, col)} style={{
                          width: "100%", textAlign: "left", padding: "12px 14px",
                          background: "none", border: "none", cursor: "pointer",
                          display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8,
                        }}>
                          <div>
                            <div style={{
                              display: "inline-block", fontSize: 11, fontWeight: 700,
                              color: colors.bg, background: colors.light,
                              borderRadius: 4, padding: "2px 7px", marginBottom: 4, letterSpacing: "0.03em",
                            }}>
                              {COL_LABELS[col]}
                            </div>
                            <div style={{ fontSize: 13, fontWeight: 600, color: "#111827", lineHeight: 1.4 }}>
                              {cell.headline}
                            </div>
                          </div>
                          <span style={{ color: colors.accent, fontSize: 16, flexShrink: 0 }}>{isOpen ? "▲" : "▼"}</span>
                        </button>

                        {isOpen && (
                          <div style={{ padding: "0 14px 12px", borderTop: `2px solid ${colors.light}` }}>
                            <ul style={{ margin: "8px 0 0 0", padding: "0 0 0 16px", listStyle: "disc" }}>
                              {cell.points.map((pt, i) => (
                                <li key={i} style={{ fontSize: 12.5, color: "#374151", marginBottom: 5, lineHeight: 1.6 }}>
                                  {pt}
                                </li>
                              ))}
                            </ul>
                          </div>
                        )}
                      </div>
                    );
                  })
                )}
              </div>
            ))}

            {/* Strategic Analysis Section */}
            <div style={{ marginTop: 32, borderRadius: 12, overflow: "hidden", border: "1px solid #e5e7eb" }}>
              <div style={{ background: "#111827", padding: "18px 24px" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#9ca3af", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 4 }}>Strategic Analysis</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: "#fff" }}>The Bigger Strategic Difference</div>
                <div style={{ fontSize: 13, color: "#9ca3af", marginTop: 4 }}>The feature overlap is larger than most people think. The optimization goals are very different.</div>
              </div>

              <div style={{ background: "#fff", padding: "20px 24px", borderBottom: "1px solid #e5e7eb" }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 0, border: "1px solid #e5e7eb", borderRadius: 8, overflow: "hidden" }}>
                  {[
                    { col: "fsr", rows: [["Optimize","hospitality"],["Maximize","guest experience"],["Revenue per","table"],["Improve","server productivity"],["Increase","table turns"],["Focus on","dining room operations"],["Enable","complex service workflows"],["Support","human-assisted ordering"]] },
                    { col: "qsr", rows: [["Optimize","throughput"],["Maximize","speed"],["Transactions per","hour"],["Improve","labor efficiency"],["Increase","order volume"],["Focus on","fulfillment operations"],["Enable","simple repeatable workflows"],["Support","self-service ordering"]] },
                  ].map(({ col, rows }, ci) => (
                    <div key={col} style={{ background: COL_COLORS[col].light, padding: "10px 16px", borderRight: ci === 0 ? "1px solid #e5e7eb" : "none" }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: COL_COLORS[col].bg, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 10 }}>{COL_LABELS[col]}</div>
                      {rows.map(([verb, noun], i) => (
                        <div key={i} style={{ fontSize: 12.5, color: "#374151", marginBottom: 6, lineHeight: 1.5 }}>
                          <span style={{ color: "#6b7280" }}>{verb} </span><strong>{noun}</strong>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ background: "#f9fafb", padding: "20px 24px", borderBottom: "1px solid #e5e7eb" }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: "#111827", marginBottom: 14 }}>What This Means for Product Investment</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                  {[
                    { col: "fsr", label: "Build primarily for FSR", items: ["Table management","Reservations","Waitlist","Courses & pacing","Server workflows","Split payments","Guest profiles","Hospitality tooling"], metric: "Better guest experience and higher check averages" },
                    { col: "qsr", label: "Build primarily for QSR", items: ["Fast POS flows","KDS","Mobile ordering","Kiosks","Drive-thru","Pickup workflows","Delivery integrations","Labor optimization"], metric: "More orders per labor hour" },
                  ].map(({ col, label, items, metric }) => (
                    <div key={col} style={{ background: "#fff", border: "1px solid #e5e7eb", borderRadius: 8, overflow: "hidden" }}>
                      <div style={{ background: COL_COLORS[col].light, padding: "8px 14px", borderBottom: "1px solid #e5e7eb" }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: COL_COLORS[col].bg, textTransform: "uppercase", letterSpacing: "0.05em" }}>If you {label}</div>
                        <div style={{ fontSize: 11, color: "#6b7280", marginTop: 2 }}>Your roadmap starts looking like:</div>
                      </div>
                      <div style={{ padding: "10px 14px" }}>
                        <ul style={{ margin: 0, padding: "0 0 0 16px", listStyle: "disc" }}>
                          {items.map((item, i) => (
                            <li key={i} style={{ fontSize: 12.5, color: "#374151", marginBottom: 4, lineHeight: 1.5 }}>{item}</li>
                          ))}
                        </ul>
                        <div style={{ marginTop: 10, padding: "6px 10px", background: COL_COLORS[col].light, borderRadius: 6, fontSize: 12, color: COL_COLORS[col].bg, fontWeight: 600 }}>
                          Winner metric: {metric}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ background: "#fff", padding: "20px 24px", borderBottom: "1px solid #e5e7eb" }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: "#111827", marginBottom: 6 }}>If you build both</div>
                <div style={{ fontSize: 13, color: "#6b7280", marginBottom: 14 }}>The challenge isn't the shared capabilities. The challenge is that every workflow decision becomes a compromise.</div>
                <div style={{ border: "1px solid #e5e7eb", borderRadius: 8, overflow: "hidden", marginBottom: 16 }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", background: "#f3f4f6", borderBottom: "1px solid #e5e7eb" }}>
                    {["Decision", "FSR wants", "QSR wants"].map((h, i) => (
                      <div key={i} style={{ padding: "8px 12px", fontSize: 11, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.05em", borderRight: i < 2 ? "1px solid #e5e7eb" : "none" }}>{h}</div>
                    ))}
                  </div>
                  {[
                    ["Ordering flow","Flexible","Extremely fast"],
                    ["Menu setup","Rich modifiers","High-volume efficiency"],
                    ["Kitchen routing","Course-aware","Speed-aware"],
                    ["Reporting","Server performance","Throughput metrics"],
                    ["Hardware","Fixed terminals","Counter, kiosk, drive-thru"],
                    ["UX","Rich workflows","Minimal clicks"],
                  ].map(([decision, fsr, qsr], i) => (
                    <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", borderBottom: i < 5 ? "1px solid #e5e7eb" : "none", background: i % 2 === 0 ? "#fff" : "#f9fafb" }}>
                      <div style={{ padding: "8px 12px", fontSize: 12.5, fontWeight: 600, color: "#111827", borderRight: "1px solid #e5e7eb" }}>{decision}</div>
                      <div style={{ padding: "8px 12px", fontSize: 12.5, color: "#374151", borderRight: "1px solid #e5e7eb" }}>{fsr}</div>
                      <div style={{ padding: "8px 12px", fontSize: 12.5, color: "#374151" }}>{qsr}</div>
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: 13, color: "#6b7280", lineHeight: 1.7 }}>
                  You often end up building <strong>two POS experiences</strong>, <strong>two reporting experiences</strong>, <strong>two operational models</strong>, and <strong>two go-to-market motions</strong> — while sharing the same platform underneath (payments, menus, integrations, analytics infrastructure).
                </div>
              </div>

              <div style={{ background: "#111827", padding: "20px 24px" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 12 }}>The Strategic Framing for SpotOn</div>
                <div style={{ background: "#1f2937", borderLeft: "3px solid #6b7280", borderRadius: "0 8px 8px 0", padding: "14px 18px", marginBottom: 16 }}>
                  <div style={{ fontSize: 13.5, color: "#e5e7eb", lineHeight: 1.7, fontStyle: "italic" }}>
                    "FSR and QSR share roughly 60–70% of the platform, but the remaining 30–40% drives purchasing decisions and operational success. The overlap is mostly infrastructure. The differentiation is in the workflow layer."
                  </div>
                </div>
                <div style={{ fontSize: 13, color: "#9ca3af", lineHeight: 1.7, marginBottom: 10 }}>That's why companies often end up with:</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 18 }}>
                  {[
                    ["Toast","leaning heavily FSR despite serving both"],
                    ["PAR Brink","optimized for QSR"],
                    ["Square for Restaurants","initially focused on simpler segments before moving upmarket"],
                  ].map(([co, desc], i) => (
                    <div key={i} style={{ fontSize: 12.5, color: "#d1d5db" }}>
                      <strong style={{ color: "#f9fafb" }}>{co}</strong> — {desc}
                    </div>
                  ))}
                </div>
                <div style={{ background: "#1f2937", borderRadius: 8, padding: "14px 18px" }}>
                  <div style={{ fontSize: 12, color: "#9ca3af", marginBottom: 6, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em" }}>The key question</div>
                  <div style={{ fontSize: 13.5, color: "#f9fafb", lineHeight: 1.7, marginBottom: 8 }}>It's not <em>"Can we serve both?"</em></div>
                  <div style={{ fontSize: 13.5, color: "#fff", fontWeight: 700, lineHeight: 1.7 }}>
                    "Which operating model are we willing to optimize for first, and which one will accept being second-class for a while?"
                  </div>
                  <div style={{ fontSize: 12, color: "#9ca3af", marginTop: 8, lineHeight: 1.6 }}>That answer will drive years of roadmap decisions.</div>
                </div>
              </div>
            </div>

            <div style={{ textAlign: "center", marginTop: 16, fontSize: 11, color: "#d1d5db" }}>
              Sources: IBISWorld · Mordor Intelligence · Statista · Whipplewood · Restroworks · TouchBistro · Rezku · MYR POS · VantaInsights · National Restaurant Authority · Business Research Insights
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<IcpComparison />);
  </script>
</body>
</html>
