        {

    const COLS = ["fsr", "qsr"];
    const COL_LABELS = { fsr: "FSR", qsr: "QSR" };
    const COL_COLORS = {

      qsr: { bg: "#b45309", accent: "#f59e0b", light: "#fffbeb" },
    };

      "very-high":  { label: "Very High",  color: "#166534", bg: "#dcfce7", bar: 5 },
      "high":       { label: "High",       color: "#1e40af", bg: "#dbeafe", bar: 4 },
      "medium":     { label: "Medium",     color: "#92400e", bg: "#fef3c7", bar: 3 },
      "medium-low": { label: "Med–Low",    color: "#9a3412", bg: "#ffedd5", bar: 2 },
      "low":        { label: "Low",        color: "#6b7280", bg: "#f3f4f6", bar: 1 },
      "very-low":   { label: "Very Low",   color: "#9ca3af", bg: "#f9fafb", bar: 1 },
      "none":       { label: "—",          color: "#d1d5db", bg: "#f9fafb", bar: 0 },
    };

    const LevelDots = ({ level }) => {
      const cfg = LEVEL_CONFIG[level] || LEVEL_CONFIG["none"];
      const total = 5;
      return (
        <div style={{ display: "flex", gap: 3, alignItems: "center" }}>
          {Array.from({ length: total }).map((_, i) => (
            <div key={i} style={{
              width: 8, height: 8, borderRadius: "50%",
              background: i < cfg.bar ? cfg.color : "#e5e7eb",
            }} />
          ))}
        </div>
      );
    };

    const DataCell = ({ entry, segColor }) => {
      const cfg = LEVEL_CONFIG[entry.level] || LEVEL_CONFIG["none"];
      const isNone = entry.level === "none";
      return (
        <div style={{ padding: "10px 12px", borderLeft: `3px solid ${isNone ? "#e5e7eb" : segColor}` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: isNone ? 0 : 6 }}>
            <span style={{
              fontSize: 11, fontWeight: 700, letterSpacing: "0.03em",
              color: cfg.color, background: cfg.bg,
              borderRadius: 4, padding: "2px 7px", whiteSpace: "nowrap",
            }}>{cfg.label}</span>
            {!isNone && <LevelDots level={entry.level} />}
          </div>
          {entry.data && !isNone && (
            <p style={{ margin: 0, fontSize: 11.5, color: "#6b7280", lineHeight: 1.5 }}>
              {entry.url
                ? <a href={entry.url} target="_blank" rel="noopener noreferrer"
                    style={{ color: "inherit", textDecoration: "underline" }}>{entry.data}</a>
                : entry.data}
            </p>
          )}
        </div>
      );

    function IcpComparison() {
      const [expanded, setExpanded] = useState({});
      const toggle = (rowIdx, col) => {
        const key = `${rowIdx}-${col}`;
        setExpanded(prev => ({ ...prev, [key]: !prev[key] }));
      };

      return (
        <div style={{ fontFamily: "'Inter', system-ui, sans-serif", background: "#f9fafb", minHeight: "100vh", padding: "2rem 1rem" }}>
          <div style={{ maxWidth: 900, margin: "0 auto" }}>

            <div style={{ marginBottom: "2rem", textAlign: "center" }}>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.15em", color: "#9ca3af", textTransform: "uppercase", marginBottom: 8 }}>
                SpotOn · ICP Strategy
              </div>
              <h1 style={{ fontSize: "clamp(1.8rem, 4vw, 2.6rem)", fontWeight: 800, color: "#111827", margin: 0, lineHeight: 1.1 }}>
                ICP Segment Comparison
              </h1>
              <p style={{ color: "#6b7280", marginTop: 8, fontSize: 15 }}>

                  display: "flex", flexDirection: "column", justifyContent: "flex-start",
                  padding: "14px 12px", background: "#fff", border: "1px solid #e5e7eb", borderRadius: 10,

                      {wideOpen ? "▲" : "▼"}

                      <div style={{ padding: "10px 12px", borderBottom: "1px solid #e5e7eb", background: "#f9fafb" }} />
                      {["fsr","qsr"].map(seg => (
                        <div key={seg} style={{
                          padding: "10px 12px", borderBottom: "1px solid #e5e7eb", borderLeft: "1px solid #e5e7eb",
                          background: COL_COLORS[seg].bg, color: COL_COLORS[seg].bg === "#1a1a2e" ? "#fff" : "#fff",
                          fontWeight: 700, fontSize: 13, letterSpacing: "0.04em",
                          display: "flex", alignItems: "center", gap: 6,
                        }}>
                          <span style={{
                            display: "inline-block", width: 10, height: 10, borderRadius: "50%",
                            background: COL_COLORS[seg].accent, flexShrink: 0,
                          }}/>
                          {COL_LABELS[seg]}
                        </div>
                      ))}
                      {row.capabilities.map((cap, ci) => (
                        <React.Fragment key={ci}>
                          <div style={{
                            padding: "10px 12px",
                            borderBottom: ci < row.capabilities.length - 1 ? "1px solid #f3f4f6" : "none",
                            display: "flex", alignItems: "center",
                          }}>
                            <span style={{ fontSize: 12.5, fontWeight: 600, color: "#374151" }}>{cap.label}</span>
                          </div>
                          {["fsr","qsr"].map(seg => (
                            <div key={seg} style={{
                              borderLeft: "1px solid #e5e7eb",
                              borderBottom: ci < row.capabilities.length - 1 ? "1px solid #f3f4f6" : "none",
                            }}>
                              <DataCell entry={cap[seg]} segColor={COL_COLORS[seg].accent} />
                            </div>
                          ))}
                        </React.Fragment>
                      ))}
                    </div>
                    {row.note && (
                      <div style={{ borderTop: "1px solid #e5e7eb", padding: "10px 14px", background: "#f9fafb" }}>
                        <p style={{ margin: 0, fontSize: 12.5, color: "#6b7280", fontStyle: "italic", lineHeight: 1.6 }}>
                          {row.note}
                        </p>
                      </div>
                    )}
                  </div>}
                  </div>
                ) : row.type === "comparison" ? (
                  <div style={{ gridColumn: "2 / 4", background: "#fff", border: "1px solid #e5e7eb", borderRadius: 10, overflow: "hidden" }}>
                    {wideOpen && <div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr" }}>
                      {[
                        { key: "mostlyFsr", label: "Mostly FSR", colors: COL_COLORS.fsr },
                        { key: "both",      label: "Both",       colors: { bg: "#374151", accent: "#6b7280", light: "#f3f4f6" } },
                        { key: "mostlyQsr", label: "Mostly QSR", colors: COL_COLORS.qsr },
                      ].map((col, ci) => (
                        <div key={col.key} style={{
                          borderRight: ci < 2 ? "1px solid #e5e7eb" : "none",
                          padding: "12px 14px",
                        }}>
                          <div style={{
                            display: "inline-block", fontSize: 11, fontWeight: 700,
                            color: col.colors.bg, background: col.colors.light,
                            borderRadius: 4, padding: "2px 7px", marginBottom: 8, letterSpacing: "0.03em",
                          }}>
                            {col.label}
                          </div>
                          <ul style={{ margin: 0, padding: "0 0 0 16px", listStyle: "disc" }}>
                            {row[col.key].map((item, i) => (
                              <li key={i} style={{ fontSize: 12.5, color: "#374151", marginBottom: 4, lineHeight: 1.5 }}>
                                {item}
                              </li>
                            ))}
                          </ul>
                        </div>
                      ))}
                    </div>
                    {row.note && (
                      <div style={{ borderTop: "1px solid #e5e7eb", padding: "10px 14px", background: "#f9fafb" }}>
                        <p style={{ margin: 0, fontSize: 12.5, color: "#6b7280", fontStyle: "italic", lineHeight: 1.6 }}>
                          {row.note}
                        </p>
                      </div>
                    )}
                    </div>}
                  </div>
                ) : (
                  COLS.map(col => {
                    const cell = row[col];
                    const key = `${rowIdx}-${col}`;
                    const isOpen = !!expanded[key];
                    const colors = COL_COLORS[col];
                    return (
                      <div key={col} style={{ background: "#fff", border: "1px solid #e5e7eb", borderRadius: 10, overflow: "hidden" }}>
                        <button onClick={() => toggle(rowIdx, col)} style={{
                          width: "100%", textAlign: "left", padding: "12px 14px",
                          background: "none", border: "none", cursor: "pointer",
                          display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8,
                        }}>
                          <div>
                            <div style={{
                              display: "inline-block", fontSize: 11, fontWeight: 700,
                              color: colors.bg, background: colors.light,
                              borderRadius: 4, padding: "2px 7px", marginBottom: 4, letterSpacing: "0.03em",
                            }}>
                              {COL_LABELS[col]}
                            </div>
                            <div style={{ fontSize: 13, fontWeight: 600, color: "#111827", lineHeight: 1.4 }}>
                              {cell.headline}
                            </div>
                          </div>
                          <span style={{ color: colors.accent, fontSize: 16, flexShrink: 0 }}>{isOpen ? "▲" : "▼"}</span>
                        </button>

                        {isOpen && (
                          <div style={{ padding: "0 14px 12px", borderTop: `2px solid ${colors.light}` }}>
                            <ul style={{ margin: "8px 0 0 0", padding: "0 0 0 16px", listStyle: "disc" }}>
                              {cell.points.map((pt, i) => (
                                <li key={i} style={{ fontSize: 12.5, color: "#374151", marginBottom: 5, lineHeight: 1.6 }}>
                                  {pt}
                                </li>
                              ))}
                            </ul>
                          </div>
                        )}
                      </div>
                    );
                  })
                )}
              </div>
            ); })}

            <div style={{ textAlign: "center", marginTop: 16, fontSize: 11, color: "#d1d5db" }}>
              Sources: IBISWorld · Mordor Intelligence · Statista · Whipplewood · Restroworks · TouchBistro · Rezku · MYR POS · VantaInsights · National Restaurant Authority · Business Research Insights
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<IcpComparison />);
  </script>
</body>
</html>
